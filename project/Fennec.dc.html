<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Tajawal',system-ui,sans-serif;background:#f5f1ea;color:#1a1510;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  input,select,textarea,button{font-family:'Tajawal',system-ui,sans-serif}
  .fx-num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#dbcfbd;border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:#c3b298}
  @keyframes fxFade{from{opacity:0}to{opacity:1}}
  @keyframes fxUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes fxToast{from{opacity:0;transform:translateY(26px) scale(.96)}to{opacity:1;transform:none}}
  @keyframes fxModal{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:none}}
  @keyframes fxTip{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @keyframes fxPop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}
  #fx-hamburger{display:none}
  #fx-backdrop{display:none}
  @media (max-width:920px){
    #fx-sidebar{position:fixed !important;top:0;right:0;height:100% !important;transform:translateX(106%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:80;box-shadow:-12px 0 50px rgba(0,0,0,.45)}
    #fx-sidebar[data-open="true"]{transform:translateX(0)}
    [dir="ltr"] #fx-sidebar{right:auto !important;left:0;transform:translateX(-106%);box-shadow:12px 0 50px rgba(0,0,0,.45)}
    [dir="ltr"] #fx-sidebar[data-open="true"]{transform:translateX(0)}
    #fx-backdrop[data-open="true"]{display:block !important}
    #fx-hamburger{display:inline-flex !important}
  }
</style>
</helmet>
<div id="fx-root" dir="rtl" style="min-height:100vh;background:#f5f1ea">{{ app }}</div>

  // ---------- helpers ----------
  tr(s){ return this.state.lang==="en" ? (this.DICT[s]!==undefined?this.DICT[s]:s) : s; }
  L(ar,en){ return this.state.lang==="en" ? en : ar; }
  MONTHS(){ return this.state.lang==="en" ? this.EN_MONTHS : this.AR_MONTHS; }
  startSide(){ return this.state.lang==="en" ? "left" : "right"; }
  setLang(l){ try{ localStorage.setItem("fennec_lang", l); }catch(e){} this.setState({ lang:l, sidebarOpen:false }); }
  money(n){ const v = Math.round(Number(n)||0); return v.toLocaleString("en-US")+(this.state.lang==="en"?" LYD":" د.ل"); }
  fmtDate(s){ if(!s) return "—"; const d=new Date(s); if(isNaN(d)) return s; return d.getDate()+" "+this.MONTHS()[d.getMonth()]+" "+d.getFullYear(); }
  ymKey(s){ const d=new Date(s); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
  curYM(){ return this.NOW.getFullYear()+"-"+String(this.NOW.getMonth()+1).padStart(2,"0"); }
  periodRange(){
    const p=this.state.period, y=this.NOW.getFullYear(), m=this.NOW.getMonth();
    if(p==="all") return null;
    if(p==="month") return {s:new Date(y,m,1), e:new Date(y,m+1,0,23,59,59)};
    if(p==="quarter"){ const q=Math.floor(m/3)*3; return {s:new Date(y,q,1), e:new Date(y,q+3,0,23,59,59)}; }
    if(p==="year") return {s:new Date(y,0,1), e:new Date(y,11,31,23,59,59)};
    return null;
  }
  inPeriod(s){ const r=this.periodRange(); if(!r) return true; const d=new Date(s); return d>=r.s && d<=r.e; }
  clientName(id){ const c=this.state.data.clients.find(c=>c.id===id); return c?c.name:"—"; }
  projectName(id){ const p=this.state.data.projects.find(p=>p.id===id); return p?p.name:"—"; }
  invEffStatus(inv){
    if(inv.status==="paid"||inv.status==="draft") return inv.status;
    const due=new Date(inv.dueDate);
    if((inv.status==="sent")&&due<this.NOW) return "overdue";
    return inv.status;
  }
  invTotal(inv){ return (inv.items||[]).reduce((a,b)=>a+(Number(b.amount)||0),0); }
  isOverdueProject(p){ if(p.status==="completed"||p.status==="cancelled") return false; return new Date(p.endDate)<this.NOW; }

  metrics(){
    const d=this.state.data;
    const txp = d.transactions.filter(t=>this.inPeriod(t.date));
    const revenue = txp.filter(t=>t.type==="revenue").reduce((a,b)=>a+b.amount,0);
    const costs = txp.filter(t=>t.type==="cost").reduce((a,b)=>a+b.amount,0);
    const overhead = txp.filter(t=>t.type==="overhead").reduce((a,b)=>a+b.amount,0);
    const net = revenue-costs-overhead;
    const margin = revenue>0 ? (net/revenue*100) : 0;
    const outstanding = d.invoices.filter(i=>{const s=this.invEffStatus(i); return (s==="sent"||s==="overdue")&&this.inPeriod(i.issueDate);}).reduce((a,b)=>a+(this.invTotal(b)-(b.paidAmount||0)),0);
    const active = d.projects.filter(p=>p.status==="active").length;
    return { revenue, costs, overhead, net, margin, outstanding, active };
  }

      const ref = t.type==="overhead"?this.tr(this.catLabel(t.category)):this.projectName(t.projectId);
      rows.push([label,t.date,(t.desc||"").replace(/"/g,'""'),ref,t.amount]);
    });
    const csv="\uFEFF"+rows.map(r=>r.map(c=>'"'+String(c)+'"').join(",")).join("\n");
